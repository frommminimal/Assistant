<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Voice — История</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f0f1a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #1e1e2f;
            border-radius: 32px;
            padding: 20px;
        }
        button {
            background: #4f46e5;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 12px 24px;
            border-radius: 40px;
            margin: 16px 0;
            cursor: pointer;
            width: 100%;
        }
        .status {
            background: #0f0f1a;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .history {
            background: #0f0f1a;
            border-radius: 24px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 16px;
            padding: 10px 14px;
            border-radius: 20px;
            max-width: 90%;
        }
        .user {
            background: #4f46e5;
            align-self: flex-end;
            text-align: right;
            margin-left: auto;
        }
        .assistant {
            background: #2a2a3c;
            text-align: left;
        }
        .label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .flex {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🎙️ DeepSeek Voice</h2>
    <div class="status" id="status">⚡ Готов. Нажми кнопку и скажи.</div>
    <button id="recordBtn">🎤 Записать голос</button>
    <div class="history" id="history">
        <div class="assistant message">💬 Здесь появится история разговора...</div>
    </div>
</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const statusDiv = document.getElementById('status');
    const historyDiv = document.getElementById('history');

    let synthesis = window.speechSynthesis;
    let selectedVoice = null;
    let currentRecognition = null;

    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
        const label = document.createElement('div');
        label.className = 'label';
        label.innerText = isUser ? 'Вы' : 'Ассистент';
        const textDiv = document.createElement('div');
        textDiv.innerText = text;
        msgDiv.appendChild(label);
        msgDiv.appendChild(textDiv);
        historyDiv.appendChild(msgDiv);
        historyDiv.scrollTop = historyDiv.scrollHeight;
    }

    function setStatus(text, isError = false) {
        statusDiv.innerHTML = text;
        statusDiv.style.color = isError ? '#ff8888' : '#b9b9e6';
    }

    function initVoice() {
        const voices = synthesis.getVoices();
        if (voices.length) {
            selectedVoice = voices.find(v => v.lang === 'ru-RU' && (v.name.includes('Google') || v.name.includes('male'))) || voices.find(v => v.lang === 'ru-RU');
            if (selectedVoice) console.log('Голос выбран:', selectedVoice.name);
        } else {
            synthesis.onvoiceschanged = initVoice;
        }
    }
    if (synthesis) {
        synthesis.onvoiceschanged = initVoice;
        initVoice();
    }

    function speakText(text) {
        if (!synthesis) return;
        synthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.9;
        if (selectedVoice) utterance.voice = selectedVoice;
        utterance.onstart = () => setStatus('🔊 Озвучиваю ответ...');
        utterance.onend = () => setStatus('⚡ Готов. Нажмите кнопку.');
        utterance.onerror = () => setStatus('⚠️ Ошибка озвучки', true);
        synthesis.speak(utterance);
    }

    async function askDeepSeek(question) {
        setStatus('🧠 Запрос к DeepSeek...');
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer sk-3ba7ea2ac8f1479294c8c4422e8ea606'
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: 'Отвечай кратко, живым разговорным языком, как друг.' },
                        { role: 'user', content: question }
                    ],
                    temperature: 0.7,
                    max_tokens: 500
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            return data.choices[0].message.content;
        } catch (err) {
            console.error(err);
            setStatus('❌ Ошибка связи с DeepSeek', true);
            return 'Извини, сейчас не могу ответить. Проверь интернет.';
        }
    }

    async function startRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            setStatus('❌ Распознавание не поддерживается', true);
            return;
        }

        if (currentRecognition) {
            currentRecognition.abort();
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            setStatus('🎙️ Слушаю... говорите');
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            setStatus(`⚠️ Ошибка: ${event.error}`, true);
            currentRecognition = null;
        };

        recognition.onend = () => {
            if (currentRecognition) {
                setStatus('⚡ Готов. Нажмите кнопку.');
                currentRecognition = null;
            }
        };

        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            setStatus(`📝 Распознано: "${userText}"`);
            addMessage(userText, true);

            setStatus('🤔 Думаю...');
            const answer = await askDeepSeek(userText);
            addMessage(answer, false);
            speakText(answer);
        };

        currentRecognition = recognition;
        recognition.start();
    }

    recordBtn.onclick = () => {
        if (currentRecognition) {
            currentRecognition.abort();
            currentRecognition = null;
        }
        startRecognition();
    };
</script>
</body>
</html>
