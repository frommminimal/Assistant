<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Voice</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f0f1a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #1e1e2f;
            border-radius: 32px;
            padding: 20px;
        }
        button {
            background: #4f46e5;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 12px 24px;
            border-radius: 40px;
            margin: 16px 0;
            cursor: pointer;
            width: 100%;
        }
        .status {
            background: #0f0f1a;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .history {
            background: #0f0f1a;
            border-radius: 24px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 16px;
            padding: 10px 14px;
            border-radius: 20px;
            max-width: 90%;
        }
        .user {
            background: #4f46e5;
            margin-left: auto;
            text-align: right;
        }
        .assistant {
            background: #2a2a3c;
            text-align: left;
        }
        .label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🎙️ DeepSeek Voice</h2>
    <div class="status" id="status">⚡ Готов. Нажмите кнопку.</div>
    <button id="recordBtn">🎤 Записать голос</button>
    <div class="history" id="history">
        <div class="assistant message">💬 Здесь появится история разговора...</div>
    </div>
</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const statusDiv = document.getElementById('status');
    const historyDiv = document.getElementById('history');

    let synthesis = window.speechSynthesis;
    let selectedVoice = null;

    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
        const label = document.createElement('div');
        label.className = 'label';
        label.innerText = isUser ? 'Вы' : 'Ассистент';
        const textDiv = document.createElement('div');
        textDiv.innerText = text;
        msgDiv.appendChild(label);
        msgDiv.appendChild(textDiv);
        historyDiv.appendChild(msgDiv);
        historyDiv.scrollTop = historyDiv.scrollHeight;
    }

    function setStatus(text, isError = false) {
        statusDiv.innerHTML = text;
        statusDiv.style.color = isError ? '#ff8888' : '#b9b9e6';
    }

    function initVoice() {
        const voices = synthesis.getVoices();
        if (voices.length) {
            selectedVoice = voices.find(v => v.lang === 'ru-RU' && (v.name.includes('Google') || v.name.includes('male'))) || voices.find(v => v.lang === 'ru-RU');
        } else {
            synthesis.onvoiceschanged = initVoice;
        }
    }
    if (synthesis) {
        synthesis.onvoiceschanged = initVoice;
        initVoice();
    }

    function speakText(text) {
        if (!synthesis) return;
        synthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.9;
        if (selectedVoice) utterance.voice = selectedVoice;
        utterance.onstart = () => setStatus('🔊 Озвучиваю...');
        utterance.onend = () => setStatus('⚡ Готов. Нажмите кнопку.');
        utterance.onerror = () => setStatus('⚠️ Ошибка озвучки', true);
        synthesis.speak(utterance);
    }

    async function askDeepSeek(question) {
        setStatus('🧠 Запрос к DeepSeek...');
        try {
            const response = await fetch('https://cors-proxy-4rd.pages.dev/proxy', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ question: question })
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }
            const data = await response.json();
            return data.answer;
        } catch (err) {
            console.error(err);
            setStatus(`❌ Ошибка: ${err.message}`, true);
            return 'Извини, сейчас не могу ответить. Попробуй позже.';
        }
    }

    async function startRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            setStatus('❌ Распознавание не поддерживается', true);
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.interimResults = false;

        recognition.onstart = () => setStatus('🎙️ Слушаю...');
        recognition.onerror = (e) => setStatus(`⚠️ Ошибка: ${e.error}`, true);
        recognition.onend = () => setStatus('⚡ Готов. Нажмите кнопку.');

        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            setStatus(`📝 Распознано: "${userText}"`);
            addMessage(userText, true);

            const answer = await askDeepSeek(userText);
            addMessage(answer, false);
            speakText(answer);
        };

        recognition.start();
    }

    recordBtn.onclick = startRecognition;
</script>
</body>
</html>
